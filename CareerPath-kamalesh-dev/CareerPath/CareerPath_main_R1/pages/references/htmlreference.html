    /* =====================================================
       RENDER: All tag sections
    ===================================================== */
    function renderSections() {
      const container = document.getElementById('sectionsContainer');

      DATA.sections.forEach(sec => {
        const section = document.createElement('section');
        section.className = sec.wrapClass;
        section.id = sec.id;

        if (sec.hasSearch) {
          const searchDiv = document.createElement('div');
          searchDiv.className = 'search';
          const inp = document.createElement('input');
          inp.type = 'text';
          inp.placeholder = 'Search skills ,courses,roles...';
          inp.id = 'search-html';
          const btn = document.createElement('button');
          btn.className = 'icon';
          btn.id = 'search-btn';
          setText(btn, '🔍');
          searchDiv.appendChild(inp);
          searchDiv.appendChild(btn);
          section.appendChild(searchDiv);
        }

        const wrapper = document.createElement('div');

        const h1 = document.createElement('h1');
        h1.className = sec.titleClass;
        setText(h1, sec.title);
        wrapper.appendChild(h1);

        const p = document.createElement('p');
        p.className = sec.descClass;
        setText(p, sec.desc);
        wrapper.appendChild(p);

        const table = document.createElement('table');
        const thead = document.createElement('thead');
        const hRow = document.createElement('tr');
        ['Tag', 'Description', 'HTML5 Support'].forEach(text => {
          const th = document.createElement('th');
          setText(th, text);
          hRow.appendChild(th);
        });
        thead.appendChild(hRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        sec.tags.forEach(t => {
          const tr = document.createElement('tr');

          const tdTag = document.createElement('td');

          setText(tdTag, t.tag);

          const tdDesc = document.createElement('td');
          tdDesc.innerHTML = t.desc;

          const tdSupport = document.createElement('td');
          tdSupport.className = 'check';
          setText(tdSupport, t.html5 ? '✓' : '✗ Not supported in HTML5');

          tr.appendChild(tdTag);
          tr.appendChild(tdDesc);
          tr.appendChild(tdSupport);
          tbody.appendChild(tr);
        });
        table.appendChild(tbody);

        wrapper.appendChild(table);
        section.appendChild(wrapper);
        container.appendChild(section);
      });
    }

    /* =====================================================
       AUTOMATED KEYWORD HYPERLINKING ENGINE (BRD Phase 1)
       - Runs AFTER all content is rendered
       - First occurrence only, word-boundary, case-insensitive
       - Skips existing <a> tags and code/script content
       - Opens in new tab
    ===================================================== */
    /* =====================================================
       AUTOMATED KEYWORD HYPERLINKING ENGINE 
       - Reads the 'course' and 'topic' to build the URL
       - Redirects to main index.html with query parameters
    ===================================================== */
    function runKeywordEngine() {
      const linked = new Set();

      // Collect all description <td> cells (2nd column of every table row)
      const descCells = document.querySelectorAll('#sectionsContainer td:nth-child(2)');

      descCells.forEach(cell => {
        // UPDATED: Destructure course and topic instead of link
        DATA.keywords.forEach(({ word, course, topic }) => {
          if (linked.has(word.toLowerCase())) return;

          // Only replace in text nodes — skip any existing <a> inside the cell
          const walker = document.createTreeWalker(cell, NodeFilter.SHOW_TEXT, {
            acceptNode: function (node) {
              // Skip if inside an <a> tag
              let parent = node.parentElement;
              while (parent && parent !== cell) {
                if (parent.tagName === 'A') return NodeFilter.FILTER_REJECT;
                parent = parent.parentElement;
              }
              return NodeFilter.FILTER_ACCEPT;
            }
          });

          const textNodes = [];
          let n;
          while ((n = walker.nextNode())) textNodes.push(n);

          textNodes.forEach(textNode => {
            if (linked.has(word.toLowerCase())) return;
            const safeWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp('\\b(' + safeWord + ')\\b', 'i');
            if (regex.test(textNode.nodeValue)) {
              const parts = textNode.nodeValue.split(regex);
              if (parts.length > 1) {
                const frag = document.createDocumentFragment();
                parts.forEach((part, i) => {
                  if (i % 2 === 1) {
                    const a = document.createElement('a');

                    // UPDATED: Build the dynamic URL!
                    const url = `../index.html?course=${encodeURIComponent(course)}&topic=${encodeURIComponent(topic)}`;
                    a.href = url;

                    // Optional: Remove target="_blank" if you want it to open in the same tab instead of a new one
                    a.target = '_blank';
                    a.rel = 'noopener noreferrer';

                    // Styled to match your neon teal theme
                    a.style.color = '#00ffb3';
                    a.style.textDecoration = 'none';
                    a.style.fontWeight = 'bold';

                    a.className = 'auto-kw';
                    a.textContent = part;
                    frag.appendChild(a);
                    linked.add(word.toLowerCase());
                  } else {
                    frag.appendChild(document.createTextNode(part));
                  }
                });
                textNode.parentNode.replaceChild(frag, textNode);
              }
            }
          });
        });
      });
    }


    /* =====================================================
       INIT — render everything then run keyword engine
    ===================================================== */
    renderTOC();
    renderSections();
    renderCompleteList();
    renderAdditional();
    renderSummary();
    renderNotes();
    runKeywordEngine();
