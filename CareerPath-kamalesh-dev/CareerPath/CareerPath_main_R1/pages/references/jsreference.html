    /* =====================================================
       SHARED: build groups (h4 + ul with code badges)
       Separator used is " - " (single dash)
    ===================================================== */
    function buildGroups(groups, container) {
      groups.forEach(g => {
        container.appendChild(makeEl('h4', null, g.heading));
        const ul = makeEl('ul');
        g.items.forEach(raw => {
          const li = makeEl('li');
          const dash = raw.indexOf(' - ');
          if (dash !== -1) {
            const code = makeEl('code', null, raw.slice(0, dash));
            li.appendChild(code);
            li.appendChild(document.createTextNode(' - ' + raw.slice(dash + 3)));
          } else {
            li.textContent = raw;
          }
          ul.appendChild(li);
        });
        container.appendChild(ul);
      });
    }

    /* =====================================================
       AUTOMATED KEYWORD HYPERLINKING ENGINE
       - Runs AFTER all content is rendered
       - First occurrence only, word-boundary, case-insensitive
       - Skips existing <a> and <code> tags
       - Opens Wikipedia in new tab
    ===================================================== */
    function runKeywordEngine() {
      const linked = new Set();

      const allItems = document.querySelectorAll(
        '#coreObjectsContainer li, #bomContainer li, #domContainer li, ' +
        '#eventsContainer li, #operatorsContainer li'
      );

      allItems.forEach(li => {
        DATA.keywords.forEach(({ word, link }) => {
          if (linked.has(word.toLowerCase())) return;

          const walker = document.createTreeWalker(li, NodeFilter.SHOW_TEXT, {
            acceptNode(node) {
              let p = node.parentElement;
              while (p && p !== li) {
                if (p.tagName === 'A' || p.tagName === 'CODE') return NodeFilter.FILTER_REJECT;
                p = p.parentElement;
              }
              return NodeFilter.FILTER_ACCEPT;
            }
          });

          const textNodes = [];
          let n;
          while ((n = walker.nextNode())) textNodes.push(n);

          textNodes.forEach(textNode => {
            if (linked.has(word.toLowerCase())) return;
            const safeWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp('\\b(' + safeWord + ')\\b', 'i');
            if (regex.test(textNode.nodeValue)) {
              const parts = textNode.nodeValue.split(regex);
              if (parts.length > 1) {
                const frag = document.createDocumentFragment();
                parts.forEach((part, i) => {
                  if (i % 2 === 1) {
                    const a = document.createElement('a');
                    a.href = link; a.target = '_blank';
                    a.rel = 'noopener noreferrer';
                    a.className = 'auto-kw';
                    a.textContent = part;
                    frag.appendChild(a);
                    linked.add(word.toLowerCase());
                  } else {
                    frag.appendChild(document.createTextNode(part));
                  }
                });
                textNode.parentNode.replaceChild(frag, textNode);
              }
            }
          });
        });
      });
    }


    /* =====================================================
       INIT - render everything then run keyword engine
    ===================================================== */
