<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerPath - React Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: #fff; display: flex; flex-direction: column; height: 100vh; }
        
        /* Navbar */
        .editor-nav { display: flex; justify-content: space-between; align-items: center; background-color: #1e293b; padding: 15px 30px; border-bottom: 2px solid #00ffb3; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-icon { background: #00ffb3; color: #000; font-weight: 800; padding: 8px 12px; border-radius: 8px; font-size: 18px; }
        .logo-text { font-size: 20px; font-weight: 600; color: #f8fafc; }
        .title-badge { background: rgba(0, 255, 179, 0.1); color: #00ffb3; padding: 5px 12px; border-radius: 20px; font-size: 14px; border: 1px solid #00ffb3; }
        .run-btn { background: #00ffb3; color: #000; border: none; padding: 10px 25px; font-size: 16px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        .run-btn:hover { background: #00cc8f; box-shadow: 0 0 15px rgba(0, 255, 179, 0.4); }

        /* Workspace */
        .workspace { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #334155; }
        .panel-header { background: #0f172a; padding: 10px 20px; font-size: 14px; font-weight: 600; color: #94a3b8; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; }
        
        /* Code Area */
        textarea { flex: 1; background: #1e293b; color: #f8fafc; font-family: 'Courier New', Courier, monospace; font-size: 16px; padding: 20px; border: none; resize: none; outline: none; line-height: 1.5; }
        
        /* Output Area */
        iframe { flex: 1; width: 100%; height: 100%; border: none; background: #ffffff; }
    </style>
</head>
<body>

    <nav class="editor-nav">
        <div class="logo-area">
            <div class="logo-icon">CP</div>
            <div class="logo-text">CareerPath</div>
            <div class="title-badge">⚛️ React Compiler</div>
        </div>
        <button class="run-btn" onclick="runReact()">▶ Run Code</button>
    </nav>

    <div class="workspace">
        <div class="panel">
            <div class="panel-header">App.js (JSX)</div>
            <textarea id="react-code" spellcheck="false"></textarea>
        </div>
        <div class="panel">
            <div class="panel-header">Browser Output</div>
            <iframe id="output-frame"></iframe>
        </div>
    </div>

    <script>
        const defaultReactCode = `// Write your React components here!
function App() {
  const [count, React.useState] = React.useState(0);

  return (
    <div style={{ fontFamily: 'Arial', textAlign: 'center', marginTop: '50px' }}>
      <h1 style={{ color: '#0b1120' }}>Hello, CareerPath! 🚀</h1>
      <p>Start editing to see some magic happen!</p>
      
      <button 
        onClick={() => React.useState(count + 1)}
        style={{ padding: '10px 20px', fontSize: '16px', background: '#00ffb3', border: 'none', borderRadius: '5px', cursor: 'pointer', fontWeight: 'bold' }}>
        Clicked {count} times
      </button>
    </div>
  );
}

// Render the App component to the DOM
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);`;

        // 1. Load code from localStorage (or use default)
        window.onload = () => {
            const savedCode = localStorage.getItem('careerPathReactCode');
            document.getElementById('react-code').value = savedCode || defaultReactCode;
            runReact(); // Auto-run on load
        };

        // 2. The Magic Engine: Wrap JSX in HTML & Babel and send to iframe
        function runReact() {
            const userCode = document.getElementById('react-code').value;
            const iframe = document.getElementById('output-frame');
            
            // This is the invisible boilerplate that makes React work in the browser
            const boilerplate = `
                <!DOCTYPE html>
                <html>
                <head>
                    <script src="https://unpkg.com/react@18/umd/react.development.js"><\/script>
                    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"><\/script>
                    <script src="https://unpkg.com/@babel/standalone/babel.min.js"><\/script>
                </head>
                <body>
                    <div id="root"></div>
                    <script type="text/babel">
                        ${userCode}
                    <\/script>
                </body>
                </html>
            `;

            // Inject the combined code into the iframe
            const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(boilerplate);
            iframeDoc.close();
        }
    </script>
</body>
</html>
